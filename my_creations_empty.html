<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script>
  tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: {
      "surface-background":"#0A0C10","surface-card":"#161B22","border-subtle":"#30363D",
      "text-primary":"#F0F6FC","text-secondary":"#8B949E","electric-cyan":"#00D1FF","vivid-purple":"#9D5BFF"
    }}}
  };
</script>
<style>
  html,body{background:#0A0C10;color:#F0F6FC;font-family:Inter,system-ui,sans-serif;margin:0;overflow-x:hidden}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:24px}
  @media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr)}}
  .card{background:#161B22;border:1px solid #30363D;border-radius:0;overflow:hidden;cursor:pointer;transition:box-shadow 0.2s}
  .card:hover{box-shadow:0 4px 20px rgba(0,209,255,0.15)}
  .card-img-wrap{position:relative;width:100%;padding-bottom:133.33%;background:#0a0c10}
  .card-img-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;text-align:center;color:#8B949E;grid-column:1/-1}
  .empty i{font-size:48px;margin-bottom:16px;opacity:0.4}
  .empty h3{font-size:18px;font-weight:700;color:#c4b5fd;margin:0 0 8px 0}
  .empty p{font-size:14px;max-width:400px;line-height:1.5;margin:0 0 24px 0}
  .empty .email{color:#00D1FF;font-weight:600}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;text-decoration:none;transition:all 0.2s}
  .btn-primary{background:linear-gradient(135deg,#9D5BFF,#00D1FF);color:#fff}
  .btn-primary:hover{box-shadow:0 0 24px rgba(157,91,255,0.3);transform:translateY(-1px)}
  .btn-outline{background:transparent;border:1px solid #30363D;color:#8B949E}
  .btn-outline:hover{border-color:#9D5BFF;color:#c4b5fd}
  .preview-overlay{display:none;position:fixed;inset:0;z-index:999;background:transparent;align-items:center;justify-content:center;padding:16px}
  .preview-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(30,32,36,0.8);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:background 0.2s}
  @media(min-width:768px){.preview-nav{display:flex}}
  .preview-nav:hover{background:rgba(30,32,36,1)}
  .preview-nav.prev{left:16px} .preview-nav.next{right:16px}
  .preview-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(30,32,36,0.8);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .preview-counter{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(30,32,36,0.8);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
  /* Chrome fade: UI elements only — image stays 100% opaque outside this wrapper */
  .preview-chrome{position:absolute;inset:0;opacity:0;transition:opacity 0.3s ease;pointer-events:none;z-index:2}
  .preview-chrome.visible{opacity:1}
  /* Buttons inside chrome must be clickable when visible */
  .preview-chrome.visible .preview-close,
  .preview-chrome.visible .preview-nav,
  .preview-chrome.visible #preview-actions{pointer-events:auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:40px;height:40px;border:3px solid #30363D;border-top-color:#9D5BFF;border-radius:50%;animation:spin 0.8s linear infinite}

  /* â”€â”€ Processing Card Animations â”€â”€ */
  @keyframes shimmer{
    0%{transform:translateX(-100%)}
    100%{transform:translateX(100%)}
  }
  @keyframes processingPulse{
    0%,100%{border-color:#30363D;box-shadow:0 0 0 rgba(0,209,255,0)}
    50%{border-color:rgba(0,209,255,0.35);box-shadow:0 0 16px rgba(0,209,255,0.08)}
  }
  @keyframes dotGlow{
    0%,100%{opacity:0.5;transform:scale(1)}
    50%{opacity:1;transform:scale(1.3)}
  }
  @keyframes gradientFlow{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }
  @keyframes cardReveal{
    0%{opacity:0;transform:scale(0.95)}
    100%{opacity:1;transform:scale(1)}
  }
  @keyframes iconSpin{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
  }
  @keyframes pendingResolve{
    0%{opacity:1;transform:scale(1)}
    100%{opacity:0;transform:scale(0.93) translateY(-8px)}
  }

  .processing-card{
    background:#161B22;
    border:1px solid #30363D;
    border-radius:0;
    overflow:hidden;
    animation:processingPulse 2.5s ease-in-out infinite;
    pointer-events:none;
    cursor:default;
  }
  .processing-card.resolving{
    animation:pendingResolve 0.5s ease-out forwards;
  }
  .processing-card.error{
    border-color:rgba(255,180,171,0.4)!important;
    animation:none;
  }
  .processing-card.stale{
    border-color:rgba(251,191,36,0.4)!important;
    animation:none;
    cursor:pointer;
  }

  .processing-placeholder{
    position:relative;
    width:100%;
    padding-bottom:133.33%;
    background:linear-gradient(135deg,#0c0e12,#111318,#0c0e12);
    background-size:200% 200%;
    animation:gradientFlow 4s ease infinite;
    overflow:hidden;
  }
  .processing-placeholder .grid-bg{
    position:absolute;inset:0;opacity:0.04;
    background-image:radial-gradient(#00D1FF 0.5px,transparent 0.5px);
    background-size:20px 20px;
  }
  .shimmer-overlay{
    position:absolute;inset:0;
    background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.04) 40%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.04) 60%,transparent 100%);
    animation:shimmer 2s ease-in-out infinite;
  }
  .processing-indicator{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:2;
  }
  .processing-icon-wrap{
    width:52px;height:52px;
    border-radius:50%;
    background:linear-gradient(135deg,#00D1FF,#9D5BFF,#00D1FF);
    background-size:200% 200%;
    animation:gradientFlow 3s ease infinite;
    padding:2px;
    margin-bottom:12px;
  }
  .processing-icon-inner{
    width:100%;height:100%;
    border-radius:50%;
    background:#0c0e12;
    display:flex;align-items:center;justify-content:center;
  }
  .processing-icon-inner i{
    font-size:20px;
    color:#00D1FF;
    animation:iconSpin 3s linear infinite;
  }
  .processing-label{
    font-size:13px;font-weight:600;color:#00D1FF;
    letter-spacing:0.02em;
  }
  .processing-sub{
    font-size:10px;color:#8B949E;margin-top:4px;
  }

  .card-status-bar{
    display:flex;align-items:center;gap:8px;
    padding:10px 12px;
  }
  .card-status-bar .dot{
    width:7px;height:7px;
    border-radius:50%;
    background:#00D1FF;
    animation:dotGlow 1.5s ease-in-out infinite;
  }
  .card-status-bar .dot.error-dot{
    background:#ffb4ab;
    animation:none;
  }
  .card-status-bar .type-label{
    font-size:11px;color:#8B949E;font-weight:500;
  }
  .card-status-bar .timer{
    font-size:10px;color:rgba(0,209,255,0.6);
    font-family:monospace;
    margin-left:auto;
  }
  .card-status-bar .fail-label{
    font-size:10px;color:#ffb4ab;
    margin-left:auto;
    cursor:pointer;
  }
  .card-status-bar .fail-label:hover{
    text-decoration:underline;
  }
</style>
<script src="/sidebar.js"></script>

<body>

<!-- HEADER -->
<header style="display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid #30363D;background:#0B0F19;">
  <div style="display:flex;align-items:center;gap:12px;">
    <button id="sidebar-toggle-btn" style="background:none;border:none;color:#8B949E;cursor:pointer;padding:4px;" onclick="toggleSidebar()">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span style="font-size:20px;font-weight:700;color:#fff;">fotowisuda.ai</span>
  </div>

<!-- MAIN -->
<main style="min-height:calc(100vh - 57px);padding:24px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div>
      <h2 style="font-size:24px;font-weight:700;margin:0;">My Creations</h2>

<!-- PREVIEW OVERLAY — carousel track for real-time swipe -->
<div class="preview-overlay" id="preview-overlay" onclick="closePreview()">
  <!-- Carousel viewport: clips to one slide at a time, fills overlay -->

    <!-- Track: 3 slides side-by-side; offset -100% shows center; fills viewport -->
    <div id="preview-track" style="display:flex;width:300%;height:100%;transform:translateX(-33.3333%);will-change:transform;">
      <div class="preview-slide" style="flex:0 0 33.333%;height:100%;display:flex;align-items:center;justify-content:center;">
        <img id="preview-img-0" src="" style="max-width:90%;max-height:80vh;object-fit:contain;border-radius:0;pointer-events:none;">
      </div>
      <div class="preview-slide" style="flex:0 0 33.333%;height:100%;display:flex;align-items:center;justify-content:center;">
        <img id="preview-img-1" src="" style="max-width:90%;max-height:80vh;object-fit:contain;border-radius:0;">
      </div>
      <div class="preview-slide" style="flex:0 0 33.333%;height:100%;display:flex;align-items:center;justify-content:center;">

      <button class="btn btn-outline" onclick="deleteCurrentPreview()" style="color:#ffb4ab;border-color:rgba(255,180,171,0.3);"><i class="fa-solid fa-trash-can"></i></button>

<!-- DELETE CONFIRMATION MODAL -->
<div class="preview-overlay" id="confirm-modal" onclick="cancelDelete()">
  <div style="background:#161B22;border:1px solid #30363D;border-radius:20px;padding:24px;max-width:360px;width:90%;text-align:center;" onclick="event.stopPropagation()">

<script>
// ============================================================
// SIMPLE, DIRECT GALLERY — no IIFE closures, no Tailwind tricks
// ============================================================
var _creations = [];
var _previewIdx = -1;
var _pollTimers = {};       // active polling timers per generationId
var _stopwatchTimers = {};  // active stopwatch timers per generationId
var _cycleTimers = {};      // active cycling-text timers per generationId

function getEmail() {
  var e = localStorage.getItem('active_user_email') || '';
  if (!e) { var p = new URLSearchParams(location.search); e = p.get('email') || ''; }
  return e;
}

// Build a single completed card for in-place DOM swap (no full grid re-render)
// Uses data-creation-id + openPreviewById to survive index shifts from prepends.
function buildCompletedCard(item) {
  var imgUrl = item.url || '';
  var itemId = item.id || item.generation_id || '';
  var card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('data-creation-id', itemId);
  card.setAttribute('onclick', "openPreviewById('" + itemId + "')");

  if (imgUrl) {
    var wrap = document.createElement('div');
    wrap.className = 'card-img-wrap';
    var img = document.createElement('img');
    img.src = imgUrl;
    img.alt = item.name || '';
    img.onerror = function() {
      wrap.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#5c6370;font-size:40px;">?</div>';
    };
    wrap.appendChild(img);
    card.appendChild(wrap);
  } else {
    var wrap = document.createElement('div');
    wrap.className = 'card-img-wrap';
    wrap.style.cssText = 'display:flex;align-items:center;justify-content:center;';
    var spinner = document.createElement('div');
    spinner.className = 'spinner';
    wrap.appendChild(spinner);
    card.appendChild(wrap);
    card.style.pointerEvents = 'none';
    card.style.cursor = 'default';
  }
  return card;
}

function renderAuth() {
  var c = document.getElementById('auth-container');
  if (!c) return;
  var email = getEmail();
  if (email) {
    var name = email.split('@')[0];
    name = name.charAt(0).toUpperCase() + name.slice(1);
    var init = name.substring(0,2).toUpperCase();
    c.innerHTML = '<div style="display:flex;flex-direction:column;gap:8px;">'+
      '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:#0a0c10;border:1px solid #30363D;border-radius:10px;">'+
        '<div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#00D1FF,#9D5BFF);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;">'+init+'</div>'+
        '<div style="min-width:0;"><div style="font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+name+'</div><div style="font-size:9px;color:#8B949E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+email+'</div></div>'+
      '</div>'+
      '<button onclick="doLogout()" style="width:100%;padding:8px;background:rgba(255,180,171,0.1);border:1px solid rgba(255,180,171,0.2);color:#ffb4ab;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;"><i class="fa-solid fa-right-from-bracket"></i> Keluar Sesi</button>'+
    '</div>';
  } else {
    c.innerHTML = '<button onclick="openLogin()" style="width:100%;padding:10px;background:#0a0c10;border:1px solid #30363D;color:#c4b5fd;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">'+
      '<i class="fa-solid fa-right-to-bracket"></i> Masuk Sesi</button>';
  }
  var badge = document.getElementById('user-badge');
  if (badge) badge.textContent = email || 'Guest';
}

function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  if (email && email.indexOf('@')!==-1) {
    try { localStorage.setItem('active_user_email', email); } catch(_) {}
    closeLogin();
    renderAuth();
    loadGallery();
  }
}
function openLogin() { var m = document.getElementById('login-modal'); if (m) m.style.display = 'flex'; }
function closeLogin() { var m = document.getElementById('login-modal'); if (m) m.style.display = 'none'; }
function doLogout() { try { localStorage.removeItem('active_user_email'); } catch(_) {} location.reload(); }

async function loadGallery() {
  var grid = document.getElementById('creations-grid');
  var status = document.getElementById('gallery-status');
  var count = document.getElementById('gallery-count');
  if (!grid) return;
  var email = getEmail();

  if (!email) {
    grid.innerHTML = '<div class="empty">'+
      '<i class="fa-solid fa-lock"></i>'+
      '<h3>Silakan Masuk Sesi</h3>'+
      '<p>Masuk sesi terlebih dahulu menggunakan email Anda untuk melihat hasil kreasi foto wisuda.</p>'+
      '<button class="btn btn-primary" onclick="openLogin()"><i class="fa-solid fa-right-to-bracket"></i> Masuk Sesi</button>'+
    '</div>';
    if (status) status.style.display = 'none';
    if (count) count.textContent = '0';
    return;
  }

  if (status) status.style.display = 'block';
  try {
    var resp = await fetch('/api/user-creations?email=' + encodeURIComponent(email));
    var data = await resp.json();
    _creations = data;
    if (count) count.textContent = data.length;
    if (status) status.style.display = 'none';

    if (data.length === 0) {
      // Clear grid — defer empty-state decision until after mergeProcessingCards()
      grid.innerHTML = '';
    } else {
      var html = '';
      for (var i = 0; i < data.length; i++) {
        var imgUrl = data[i].url || '';
        if (imgUrl) {
          var itemId = data[i].id || data[i].generation_id || '';
          html += '<div class="card" data-creation-id="'+itemId+'" onclick="openPreviewById(\''+itemId+'\')">'+
            '<div class="card-img-wrap"><img src="'+imgUrl+'" alt="'+data[i].name+'" onerror="this.parentElement.innerHTML=\'<div style=display:flex;align-items:center;justify-content:center;height:100%;color:#5c6370;font-size:40px;>?</div>\'"></div>'+
          '</div>';
        } else {
          // PENDING / no image yet — show spinner placeholder
          html += '<div class="card" style="pointer-events:none;cursor:default;">'+
            '<div class="card-img-wrap" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0c0e12,#111318,#0c0e12);background-size:200% 200%;animation:gradientFlow 4s ease infinite;">'+
              '<div class="spinner"></div>'+
            '</div>'+
          '</div>';
        }
      }
      grid.innerHTML = html;
    }
  } catch(e) {
    if (status) { status.innerHTML = '<p style="color:#ffb4ab;">Error: '+e.message+'</p>'; status.style.display = 'block'; }
  }

  // â”€â”€ Merge processing items from localStorage + URL pending param â”€â”€
    mergeProcessingCards();

  // Deferred empty-state: only show if truly nothing to display
  if (_creations.length === 0 && !grid.querySelector('.processing-card') && !grid.querySelector('.card')) {
    var curEmail = getEmail();
    grid.innerHTML = '<div class="empty">'+
      '<i class="fa-solid fa-wand-magic-sparkles" style="color:#9D5BFF;"></i>'+
      '<h3>Belum Ada Hasil Kreasi</h3>'+
      '<p>Sesi email <span class="email">'+curEmail+'</span> berhasil tersambung secara terisolasi. Galeri Anda masih bersih! Mulai buat foto wisuda impian Anda sekarang.</p>'+
      '<a href="/swap-bg" class="btn btn-primary"><i class="fa-solid fa-wand-magic-sparkles"></i> Mulai Berkreasi</a>'+
    '</div>';
  }
}

// ============================================================
// PROCESSING CARD RENDERING & POLLING
// ============================================================

function getJobTypeLabel(genId) {
  if (genId.indexOf('bgswapc_')===0)  return 'Background Change by Claude';
  if (genId.indexOf('bgswap_')===0)   return 'Background Change';
  if (genId.indexOf('dresswap_')===0) return 'Dress Replicate';
  if (genId.indexOf('agfilter_')===0) return 'Filter Gallery';
  if (genId.indexOf('filterswap_')===0) return 'Filter Gallery';
  if (genId.indexOf('gen_')===0)      return 'Filter Gallery Factory';
  return 'Processing';
}

function getStatusEndpoint(genId) {
  if (genId.indexOf('bgswap_')===0)   return '/api/background-swap/status/';
  if (genId.indexOf('bgswapc_')===0)  return '/api/background-swap/status/';
  if (genId.indexOf('dresswap_')===0) return '/api/dress-swap/status/';
  if (genId.indexOf('agfilter_')===0) return '/api/admin-gallery-filter/status/';
  if (genId.indexOf('filterswap_')===0) return '/api/status/';
  return '/api/status/';
}

function formatTimer(ms) {
  var totalSec = Math.floor(ms / 1000);
  var min = Math.floor(totalSec / 60);
  var sec = totalSec % 60;
  var cs = Math.floor((ms % 1000) / 10);
  return (min<10?'0'+min:min) + ':' + (sec<10?'0'+sec:sec) + '.' + (cs<10?'0'+cs:cs);
}

var _statusMessages = [
  { atSec:0,   status:'Menganalisa struktur wajah kamu…', sub:'AI sedang mendeteksi fitur wajah dari foto referensi' },
  { atSec:20,  status:'Menyelaraskan kebaya/toga wisuda…', sub:'Menyesuaikan pose & busana dengan latar tujuan' },
  { atSec:60,  status:'Menata pencahayaan latar studio…', sub:'Mengomposisikan tata cahaya & bayangan natural' },
  { atSec:120, status:'Sentuhan akhir — siap meluncur!', sub:'Merender hasil akhir dalam kualitas HD penuh' }
];

function getStatusMessage(elapsedMs) {
  var sec = elapsedMs / 1000;
  var msg = _statusMessages[0];
  for (var i = _statusMessages.length-1; i >= 0; i--) {
    if (sec >= _statusMessages[i].atSec) { msg = _statusMessages[i]; break; }
  }
  return msg;
}

function buildProcessingCardHtml(item) {
  var genId = item.generation_id || item.id;
  return '<div class="processing-card" data-generation-id="'+genId+'" data-type="'+item.type+'" style="position:relative;">'+
    '<div class="processing-placeholder">'+
      // Absolutely-positioned dead-center content
      '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;">'+
        '<div class="spinner" style="width:36px;height:36px;border-width:2px;"></div>'+
        '<span class="processing-label" id="status-'+genId+'" style="font-size:11px;color:#8B949E;text-align:center;max-width:140px;">Memproses AI...</span>'+
      '</div>'+
    '</div>'+
    // Timer — absolutely positioned bottom-right, above the placeholder background
    '<div style="position:absolute;bottom:0;right:0;padding:4px 8px;z-index:2;">'+
      '<span style="font-size:10px;color:rgba(0,209,255,0.45);font-family:monospace;" id="timer-'+genId+'">00:00.00</span>'+
    '</div>'+
  '</div>';
}

function getProcessingItems() {
  try {
    var raw = localStorage.getItem('all_creations');
    if (!raw) return [];
    var queue = JSON.parse(raw);
    var now = Date.now();
    var STALE_MS = 10 * 60 * 1000; // 10 min
    var active = [];
    var changed = false;
    for (var i = 0; i < queue.length; i++) {
      if (queue[i].status === 'processing') {
        // prune stale entries
        if (queue[i].createdAt && (now - queue[i].createdAt) > STALE_MS) {
          queue[i].status = 'failed';
          changed = true;
          continue;
        }
        active.push(queue[i]);
      }
    }
    if (changed) {
      try { localStorage.setItem('all_creations', JSON.stringify(queue)); } catch(_) {}
    }
    return active;
  } catch(_) { return []; }
}

function mergeProcessingCards() {
  var grid = document.getElementById('creations-grid');
  if (!grid) return;

  // Remove any existing processing cards (to re-render fresh)
  var existing = grid.querySelectorAll('.processing-card');
  for (var i = 0; i < existing.length; i++) { existing[i].remove(); }

  var processingItems = getProcessingItems();

  // Deduplicate: skip items already in _creations (completed)
  var completedIds = {};
  for (var c = 0; c < _creations.length; c++) {
    var cid = _creations[c].id || _creations[c].generation_id;
    if (cid) completedIds[cid] = true;
    // also check by stripped name
    var name = _creations[c].name || '';
    if (name) completedIds[name] = true;
  }

  for (var p = 0; p < processingItems.length; p++) {
    var pid = processingItems[p].generation_id || processingItems[p].id;
    if (completedIds[pid]) continue; // already completed
    if (_pollTimers[pid]) continue;  // already polling

    var cardHtml = buildProcessingCardHtml(processingItems[p]);
    grid.insertAdjacentHTML('afterbegin', cardHtml);
    startProcessingPoll(pid, processingItems[p].createdAt || null);
  }

  // Handle ?pending= URL param
  var params = new URLSearchParams(location.search);
  var pendingId = params.get('pending');
  if (pendingId && !_pollTimers[pendingId]) {
    // Check if not already completed
    if (!completedIds[pendingId]) {
      // ensure card exists
      if (!grid.querySelector('[data-generation-id="'+pendingId+'"]')) {
        var pendingItem = { generation_id: pendingId, id: pendingId, type: 'unknown', title: getJobTypeLabel(pendingId) };
        var html = buildProcessingCardHtml(pendingItem);
        grid.insertAdjacentHTML('afterbegin', html);
      }
      startProcessingPoll(pendingId, null);
    }
  }

  // Update count
  updateGalleryCount();
}

function updateGalleryCount() {
  var count = document.getElementById('gallery-count');
  if (!count) return;
  var grid = document.getElementById('creations-grid');
  var processingCards = grid ? grid.querySelectorAll('.processing-card').length : 0;
  var total = _creations.length + processingCards;
  count.textContent = total;
}

function startProcessingPoll(generationId, serverCreatedAt) {
  if (_pollTimers[generationId]) return;

  var cardEl = document.querySelector('[data-generation-id="'+generationId+'"]');
  if (!cardEl) return;

  var statusEl  = document.getElementById('status-'+generationId);
  var timerEl   = document.getElementById('timer-'+generationId);

  var startHr = performance.now();
  var baseOffsetMs = serverCreatedAt ? Math.max(0, Date.now() - serverCreatedAt) : 0;
  if (baseOffsetMs > 0 && timerEl) {
    timerEl.textContent = formatTimer(baseOffsetMs);
  }

  // â”€â”€ Stopwatch tick (every 100ms) â”€â”€
  // Cycling status messages (every 2.5s)
  var _cycleMsgs = ['Memproses AI...', 'Menganalisa gambar...', 'Menyempurnakan detail...', 'Hampir selesai...'];
  var _cycleIdx = 0;
  _cycleTimers[generationId] = setInterval(function() {
    _cycleIdx = (_cycleIdx + 1) % _cycleMsgs.length;
    if (statusEl && _pollTimers[generationId]) statusEl.textContent = _cycleMsgs[_cycleIdx];
  }, 2500);

  _stopwatchTimers[generationId] = setInterval(function() {
    var elapsed = baseOffsetMs + (performance.now() - startHr);
    if (timerEl) timerEl.textContent = formatTimer(elapsed);
  }, 100);

  var POLL_INTERVAL = 3000;
  var MAX_TIME = 360000; // 6 min
  var pollAttempts = 0;

  _pollTimers[generationId] = setInterval(function() {
    pollAttempts++;
    var elapsed = baseOffsetMs + (performance.now() - startHr);

    // â”€â”€ Timeout check â”€â”€
    if (elapsed > MAX_TIME) {
      clearTimers(generationId);
      if (statusEl) { statusEl.textContent = 'Waktu Habis'; statusEl.style.color = '#ffb4ab'; }
      markProcessingFailed(generationId);
      setTimeout(function() { if (cardEl.parentNode) cardEl.remove(); }, 8000);
      return;
    }

    // â”€â”€ Stale check (5 min based on server time) â”€â”€
    if (serverCreatedAt && (Date.now() - serverCreatedAt) > 300000) {
      clearTimers(generationId);
      if (statusEl) { statusEl.textContent = 'Gagal'; statusEl.style.color = '#fbbf24'; }
      if (timerEl)  timerEl.textContent = '--:--.--';
      cardEl.classList.add('stale');
      cardEl.style.cursor = 'pointer';
      cardEl.addEventListener('click', function() {
        cardEl.style.opacity = '0';
        cardEl.style.transition = 'opacity 0.4s';
        setTimeout(function() { if (cardEl.parentNode) cardEl.remove(); updateGalleryCount(); }, 400);
      });
      markProcessingFailed(generationId);
      return;
    }

    // â”€â”€ Progressive status messages â”€â”€
    // â”€â”€ Fetch real status â”€â”€
    var endpoint = getStatusEndpoint(generationId) + generationId;
    fetch(endpoint).then(function(r) { return r.json(); }).then(function(data) {
      var status = data.status;
      if (!status) return;

      if (status === 'COMPLETE') {
        clearTimers(generationId);
        if (statusEl) statusEl.textContent = 'Selesai!';

        // Remove from localStorage FIRST so mergeProcessingCards() doesn't re-create it
        removeProcessingItem(generationId);
        // Clean URL
        if (window.location.search.indexOf('pending=')!==-1) {
          var u = new URL(window.location);
          u.searchParams.delete('pending');
          window.history.replaceState({}, '', u.toString());
        }

        // ── Single-card swap — no full grid re-render ──────────
        // Instead of calling loadGallery() which flashes the entire grid,
        // fetch only the completed record and swap the placeholder in-place.
        cardEl.classList.add('resolving');
        var retries = 0;
        var MAX_RETRIES = 5;

        function tryFetchAndSwap() {
          var email = getEmail();
          fetch('/api/user-creations?email=' + encodeURIComponent(email))
            .then(function(r) { return r.json(); })
            .then(function(creations) {
              // Find the completed record
              var foundRecord = null;
              for (var c = 0; c < creations.length; c++) {
                var cid = creations[c].id || creations[c].generation_id;
                if (cid === generationId) { foundRecord = creations[c]; break; }
              }

              if (foundRecord && foundRecord.url) {
                // Prepend so newest creation appears first (server returns newest-first order)
                // Existing cards use ID-based onclick handlers, so they survive the index shift.
                _creations.unshift(foundRecord);
                var newCard = buildCompletedCard(foundRecord);
                if (cardEl.parentNode) {
                  cardEl.parentNode.replaceChild(newCard, cardEl);
                }
                updateGalleryCount();
                if (statusEl) statusEl.textContent = '';
              } else if (retries < MAX_RETRIES) {
                retries++;
                if (statusEl) statusEl.textContent = 'Menyelaraskan… (' + retries + '/' + MAX_RETRIES + ')';
                setTimeout(tryFetchAndSwap, 1500);
              } else {
                // Exhausted retries — fall back to full loadGallery
                if (cardEl.parentNode) cardEl.remove();
                updateGalleryCount();
                loadGallery();
              }
            })
            .catch(function() {
              if (retries < MAX_RETRIES) {
                retries++;
                setTimeout(tryFetchAndSwap, 1500);
              }
            });
        }

        setTimeout(tryFetchAndSwap, 1000);
      } else if (status === 'FAILED') {
        clearTimers(generationId);
        if (statusEl) { statusEl.textContent = 'Gagal'; statusEl.style.color = '#ffb4ab'; }
        if (timerEl)  timerEl.textContent = '--:--.--';
        cardEl.classList.add('error');
        markProcessingFailed(generationId);
        setTimeout(function() { if (cardEl.parentNode) cardEl.remove(); updateGalleryCount(); }, 10000);
      }
    }).catch(function() {
      // Network glitch — retry next interval
    });
  }, POLL_INTERVAL);
}

function clearTimers(generationId) {
  if (_pollTimers[generationId])      { clearInterval(_pollTimers[generationId]);      delete _pollTimers[generationId]; }
  if (_stopwatchTimers[generationId]) { clearInterval(_stopwatchTimers[generationId]); delete _stopwatchTimers[generationId]; }
  if (_cycleTimers[generationId])     { clearInterval(_cycleTimers[generationId]);     delete _cycleTimers[generationId]; }
}

function removeProcessingItem(generationId) {
  try {
    var raw = localStorage.getItem('all_creations');
    if (!raw) return;
    var queue = JSON.parse(raw);
    var changed = false;
    for (var i = queue.length-1; i >= 0; i--) {
      if ((queue[i].generation_id || queue[i].id) === generationId && queue[i].status === 'processing') {
        queue.splice(i, 1);
        changed = true;
      }
    }
    if (changed) { localStorage.setItem('all_creations', JSON.stringify(queue)); }
  } catch(_) {}
}

function markProcessingFailed(generationId) {
  try {
    var raw = localStorage.getItem('all_creations');
    if (!raw) return;
    var queue = JSON.parse(raw);
    var changed = false;
    for (var i = 0; i < queue.length; i++) {
      if ((queue[i].generation_id || queue[i].id) === generationId && queue[i].status === 'processing') {
        queue[i].status = 'failed';
        changed = true;
      }
    }
    if (changed) { localStorage.setItem('all_creations', JSON.stringify(queue)); }
  } catch(_) {}
}

var _flipThumb = null;      // source card element for FLIP animation
var _flipAnimating = false;  // guard against concurrent animations
var _flipThumbImg = null;    // the img inside the source card
var _flipRect = null;        // cached bounding rect of the source card

// ── Carousel helpers ────────────────────────────────────────────
// Track is 300% wide. Each slide = 33.333% of track = 1 viewport.
// translateX is % of track's OWN width, so:
//   slide 0 (prev):  translateX(0)
//   slide 1 (curr):  translateX(calc(-100% / 3)) ≈ -33.333%
//   slide 2 (next):  translateX(calc(-200% / 3)) ≈ -66.667%
var _carouselIdx = -1;

function getCenterImg() { return document.getElementById('preview-img-1'); }
function getTrack()     { return document.getElementById('preview-track'); }
function getViewport()  { return document.getElementById('preview-viewport'); }

function trackPos(slideIdx) { return (-slideIdx * 100 / 3).toFixed(4) + '%'; }
function trackCenter()      { return trackPos(1); }  // -33.3333%
function trackNext()        { return trackPos(2); }  // -66.6667%
function trackPrev()        { return trackPos(0); }  // 0%

function loadCarouselSlots(idx) {
  var imgs = [
    document.getElementById('preview-img-0'),
    document.getElementById('preview-img-1'),
    document.getElementById('preview-img-2')
  ];
  if (!imgs[0] || !imgs[1] || !imgs[2]) return;
  var total = _creations.length;
  var prev = total > 1 ? (idx - 1 + total) % total : -1;
  var next = total > 1 ? (idx + 1) % total : -1;
  imgs[0].src = prev >= 0 && prev !== idx ? (_creations[prev].url || '') : '';
  imgs[1].src = _creations[idx].url || '';
  imgs[2].src = next >= 0 && next !== idx ? (_creations[next].url || '') : '';
  _carouselIdx = idx;
}

function resetTrack(idx) {
  var track = getTrack();
  if (track) { track.style.transition = 'none'; track.style.transform = 'translateX(' + trackCenter() + ')'; }
  loadCarouselSlots(idx);
  // Keep FLIP close target in sync with the active carousel index
  captureThumbRect(idx);
}

function showChrome() {
  var chrome = document.getElementById('preview-chrome');
  if (chrome) chrome.classList.add('visible');
}
function hideChrome() {
  var chrome = document.getElementById('preview-chrome');
  if (chrome) chrome.classList.remove('visible');
}

// ── FLIP shared-element transition ─────────────────────────────
// Captures the thumbnail's position, then animates the modal image
// from that position to its final centered state.

// Find the DOM card element for a given _creations index by resolving
// its item ID and querying the data-creation-id attribute.  This survives
// DOM reordering (prepends / removes) because it doesn't rely on positional
// nth-child scanning.
function getCardElement(idx) {
  if (idx < 0 || idx >= _creations.length) return null;
  var itemId = _creations[idx].id || _creations[idx].generation_id;
  if (!itemId) return null;
  return document.querySelector('#creations-grid .card[data-creation-id="' + itemId + '"]');
}

function findCardIndexById(id) {
  for (var i = 0; i < _creations.length; i++) {
    if ((_creations[i].id || _creations[i].generation_id) === id) return i;
  }
  return -1;
}

function captureThumbRect(idx) {
  // Restore previous thumbnail before capturing a new one
  if (_flipThumbImg) _flipThumbImg.style.opacity = '';
  var thumb = getCardElement(idx);
  if (!thumb) { _flipThumb = null; _flipThumbImg = null; return null; }
  var thumbImg = thumb.querySelector('img');
  _flipThumb = thumb;
  _flipThumbImg = thumbImg || null;
  _flipRect = (thumbImg || thumb).getBoundingClientRect();
  return _flipRect;
}

var EASING = 'cubic-bezier(0.25, 1, 0.5, 1)';
var DURATION_OPEN = 320;
var DURATION_CLOSE = 250;

// Open preview by item ID — resolves the current array index dynamically
// so that onclick handlers survive prepends/unshifts to _creations.
function openPreviewById(id) {
  var idx = -1;
  for (var i = 0; i < _creations.length; i++) {
    if ((_creations[i].id || _creations[i].generation_id) === id) {
      idx = i;
      break;
    }
  }
  if (idx < 0) return;
  openPreview(idx);
}

function openPreview(idx) {
  if (idx < 0 || idx >= _creations.length) return;
  if (_flipAnimating) return;

  _previewIdx = idx;
  var ov = document.getElementById('preview-overlay');
  var cnt = document.getElementById('preview-counter');
  if (!ov) return;

  // Load carousel slots (center = current, left = prev, right = next)
  resetTrack(idx);
  var img = getCenterImg();
  if (cnt) cnt.textContent = (idx + 1) + ' / ' + _creations.length;

  var fromRect = captureThumbRect(idx);

  // Show overlay
  ov.style.background = 'rgba(0,0,0,0)';
  ov.style.display = 'flex';
  ov.offsetHeight;

  if (fromRect && img) {
    if (_flipThumbImg) _flipThumbImg.style.opacity = '0';

    var toRect = img.getBoundingClientRect();

    var dX = fromRect.left + fromRect.width / 2 - (toRect.left + toRect.width / 2);
    var dY = fromRect.top + fromRect.height / 2 - (toRect.top + toRect.height / 2);
    var sX = fromRect.width / toRect.width;
    var sY = fromRect.height / toRect.height;
    var s  = Math.max(sX, sY);

    ov.style.overflow = 'hidden';
    img.style.objectFit = 'cover';
    img.style.transformOrigin = 'center center';
    img.style.transform = 'translate(' + dX + 'px, ' + dY + 'px) scale(' + s + ', ' + s + ')';
    img.style.borderRadius = '0px';
    img.style.willChange = 'transform, border-radius';
    img.offsetHeight;

    _flipAnimating = true;
    ov.style.transition = 'background ' + (DURATION_OPEN / 1000) + 's ease';
    ov.style.background = 'rgba(0,0,0,0.92)';
    showChrome();

    img.style.transition = 'transform ' + (DURATION_OPEN / 1000) + 's ' + EASING
                         + ', border-radius ' + (DURATION_OPEN / 1000) + 's ease';
    img.style.transform = 'translate(0, 0) scale(1, 1)';
    img.style.borderRadius = '0px';

    var onDone = function() {
      _flipAnimating = false;
      ov.style.overflow = '';
      img.style.objectFit = '';
      img.style.transition = '';
      img.style.transform = '';
      img.style.transformOrigin = '';
      img.style.borderRadius = '';
      img.style.willChange = '';
      img.removeEventListener('transitionend', onDone);
    };
    img.addEventListener('transitionend', onDone);

    setTimeout(function() {
      if (_flipAnimating) { onDone(); }
    }, DURATION_OPEN + 100);
  } else {
    ov.style.background = 'rgba(0,0,0,0.92)';
    showChrome();
  }
}

function closePreview() {
  if (_flipAnimating) return;

  var ov = document.getElementById('preview-overlay');
  var img = getCenterImg();
  var vp = getViewport();
  if (!ov || !img) { _previewIdx = -1; return; }

  var thumb = _flipThumb;
  var thumbImg = _flipThumbImg;
  var toRect = null;

  if (thumb && _previewIdx >= 0 && _previewIdx < _creations.length) {
    thumb.scrollIntoView({ behavior: 'instant', block: 'nearest' });
    toRect = (thumbImg || thumb).getBoundingClientRect();
  }

  if (toRect) {
    _flipAnimating = true;
    hideChrome();

    // Hide carousel and thumbnail during animation
    if (vp) vp.style.opacity = '0';
    if (thumbImg) thumbImg.style.opacity = '0';

    // ── Create clone wrapper with overflow:hidden ──────────────
    // The wrapper provides continuous clipping as it shrinks.
    // Inner image uses object-fit:cover → scales automatically.
    var fromRect = img.getBoundingClientRect();
    var clone = document.createElement('div');
    clone.id = 'flip-clone';
    clone.style.cssText = 'position:fixed;z-index:1001;overflow:hidden;pointer-events:none;'
      + 'left:' + fromRect.left + 'px;top:' + fromRect.top + 'px;'
      + 'width:' + fromRect.width + 'px;height:' + fromRect.height + 'px;'
      + 'border-radius:0;';

    var cloneImg = document.createElement('img');
    cloneImg.src = img.src;
    cloneImg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    clone.appendChild(cloneImg);
    document.body.appendChild(clone);

    // Force layout
    clone.offsetHeight;

    // Fade overlay background
    ov.style.transition = 'background ' + (DURATION_CLOSE / 1000) + 's ease';
    ov.style.background = 'rgba(0,0,0,0)';

    // Animate clone wrapper to grid cell position + size
    clone.style.transition = 'all ' + (DURATION_CLOSE / 1000) + 's ' + EASING;
    clone.style.left   = toRect.left + 'px';
    clone.style.top    = toRect.top + 'px';
    clone.style.width  = toRect.width + 'px';
    clone.style.height = toRect.height + 'px';

    var onDone = function() {
      if (clone.parentNode) clone.remove();
      ov.style.display = 'none';
      ov.style.transition = '';
      if (vp) vp.style.opacity = '';
      if (thumbImg) thumbImg.style.opacity = '';
      _flipAnimating = false;
      clone.removeEventListener('transitionend', onDone);
    };
    clone.addEventListener('transitionend', onDone);

    setTimeout(function() {
      if (_flipAnimating) { onDone(); }
    }, DURATION_CLOSE + 100);
  } else {
    ov.style.display = 'none';
    if (thumbImg) thumbImg.style.opacity = '';
  }

  // Reset state
  _flipThumb = null;
  _flipThumbImg = null;
  _flipRect = null;
  _previewIdx = -1;
}

function downloadCurrentPreview() {
  if (_previewIdx < 0 || _previewIdx >= _creations.length) return;
  var item = _creations[_previewIdx];
  if (!item || !item.url) return;
  var filename = (item.id || 'fotowisuda-creation') + '.jpg';
  forceDownload(item.url, filename);
}

async function forceDownload(imageUrl, filename) {
  var dlBtn = document.getElementById('preview-dl');
  var dlText = document.getElementById('preview-dl-text');
  var origText = dlText ? dlText.textContent : 'Download';

  // Show loading state
  if (dlBtn) dlBtn.disabled = true;
  if (dlText) dlText.textContent = 'Downloading...';

  try {
    var response = await fetch(imageUrl);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    var blob = await response.blob();
    var blobUrl = window.URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = blobUrl;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    // Revoke after a short delay to ensure the download starts
    setTimeout(function() { window.URL.revokeObjectURL(blobUrl); }, 1000);
  } catch (error) {
    console.error('Download failed:', error);
    // Fallback: open in new tab
    window.open(imageUrl, '_blank');
  } finally {
    if (dlBtn) dlBtn.disabled = false;
    if (dlText) dlText.textContent = origText;
  }
}

var _navSliding = false;
var SWIPE_THRESHOLD = 60;  // px to commit a swipe

// Animate the carousel track to a new center index, then reset slots
function slideToIndex(newIdx, dir, duration) {
  var track = getTrack();
  var cnt = document.getElementById('preview-counter');
  if (!track) return;

  _navSliding = true;
  // dir>0 (next): animate to slide 2 position; dir<0 (prev): animate to slide 0 position
  var targetX = dir > 0 ? trackNext() : trackPrev();
  track.style.transition = 'transform ' + (duration / 1000) + 's ease';
  track.style.transform = 'translateX(' + targetX + ')';

  function finish() {
    track.removeEventListener('transitionend', finish);
    track.style.transition = 'none';
    _previewIdx = newIdx;
    if (cnt) cnt.textContent = (newIdx + 1) + ' / ' + _creations.length;
    resetTrack(newIdx);  // jumps back to center position (invisible, no transition)
    _navSliding = false;
  }
  track.addEventListener('transitionend', finish);

  setTimeout(function() {
    if (_navSliding) finish();
  }, duration + 100);
}

function navPreview(dir) {
  if (_creations.length <= 1) return;
  if (_flipAnimating || _navSliding) return;
  if (dir < 0 && _previewIdx <= 0) return;
  if (dir > 0 && _previewIdx >= _creations.length - 1) return;

  var newIdx = _previewIdx + dir;
  slideToIndex(newIdx, dir, 250);
}

var _deleteTarget = null;

function deleteCurrentPreview() {
  if (_previewIdx < 0 || _previewIdx >= _creations.length) return;
  var item = _creations[_previewIdx];
  if (!item || !item.id) return;
  _deleteTarget = item;
  document.getElementById('confirm-modal').classList.add('active');
}

function confirmDelete() {
  if (!_deleteTarget) return;
  var item = _deleteTarget;
  var btn = document.querySelector('#confirm-modal button[onclick="confirmDelete()"]');
  var origHTML = btn ? btn.innerHTML : '';

  // Show loading state on the Hapus button
  if (btn) { btn.disabled = true; btn.innerHTML = '<span style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;"></span> Menghapus...'; }

  fetch('/api/user-creations/' + encodeURIComponent(item.id), { method: 'DELETE' }).then(function(r){ return r.json(); }).then(function(d){
    if (d.deleted) {
      // Close modal first
      document.getElementById('confirm-modal').classList.remove('active');
      // Remove from local array
      _creations = _creations.filter(function(c){ return c.id !== item.id; });
      // Smooth-remove the current preview card from the grid
      var card = document.querySelector('#creations-grid .card[data-creation-id="' + item.id + '"]');
      // Navigate preview to next/prev item without full loadGallery re-render
      if (_creations.length === 0) {
        closePreview();
        loadGallery();
        return;
      }
      if (_previewIdx >= _creations.length) _previewIdx = _creations.length - 1;
      openPreview(_previewIdx);
      // Refresh the grid silently
      loadGallery();
    } else {
      // Server returned non-deleted — show error
      alert('Gagal menghapus: Server tidak dapat menghapus kreasi ini.');
      document.getElementById('confirm-modal').classList.remove('active');
    }
    _deleteTarget = null;
    if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
  }).catch(function(err){
    console.error('Delete failed:', err);
    alert('Gagal menghapus: ' + (err.message || 'Kesalahan jaringan'));
    document.getElementById('confirm-modal').classList.remove('active');
    _deleteTarget = null;
    if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
  });
}

function cancelDelete() {
  document.getElementById('confirm-modal').classList.remove('active');
  _deleteTarget = null;
}

document.addEventListener('keydown', function(e) {
  var ov = document.getElementById('preview-overlay');
  if (!ov || ov.style.display !== 'flex') return;
  if (e.key === 'Escape') closePreview();
  if (e.key === 'ArrowLeft') navPreview(-1);
  if (e.key === 'ArrowRight') navPreview(1);
});

var _touchX = 0;
var _touchY = 0;
var _touchDragging = false;

document.addEventListener('touchstart', function(e) {
  if (e.touches.length !== 1) return;
  var ov = document.getElementById('preview-overlay');
  if (!ov || ov.style.display !== 'flex') return;
  _touchX = e.touches[0].clientX;
  _touchY = e.touches[0].clientY;
  _touchDragging = false;
  var track = getTrack();
  if (track) track.style.transition = 'none';
}, {passive:true});

document.addEventListener('touchmove', function(e) {
  var ov = document.getElementById('preview-overlay');
  if (!ov || ov.style.display !== 'flex') return;
  if (_navSliding || _flipAnimating) return;
  var dx = e.touches[0].clientX - _touchX;
  var dy = e.touches[0].clientY - _touchY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
    _touchDragging = true;
    var track = getTrack();
    if (track) {
      var resistance = 1;
      if ((_previewIdx <= 0 && dx > 0) || (_previewIdx >= _creations.length - 1 && dx < 0)) {
        resistance = 0.2;
      }
      var vpW = ov.offsetWidth;
      // Convert drag px → track-relative % (track = 3× viewport, so 1 vpW = 100/3 %)
      var deltaPct = (dx / vpW) * (100 / 3) * resistance;
      var basePct = -100 / 3;  // center slide position
      track.style.transform = 'translateX(' + (basePct + deltaPct).toFixed(4) + '%)';
    }
  }
}, {passive:true});

document.addEventListener('touchend', function(e) {
  var ov = document.getElementById('preview-overlay');
  if (!ov || ov.style.display !== 'flex') return;
  if (_navSliding || _flipAnimating) { _touchDragging = false; return; }
  var dx = e.changedTouches[0].clientX - _touchX;
  var track = getTrack();
  var dir = dx < 0 ? 1 : -1;

  if (_touchDragging && Math.abs(dx) > SWIPE_THRESHOLD) {
    if ((dir < 0 && _previewIdx <= 0) || (dir > 0 && _previewIdx >= _creations.length - 1)) {
      // At boundary — spring back
      if (track) {
        track.style.transition = 'transform 0.25s ease';
        track.style.transform = 'translateX(' + trackCenter() + ')';
      }
    } else {
      // Snap to adjacent slide
      var newIdx = _previewIdx + dir;
      var targetX = dir > 0 ? trackNext() : trackPrev();
      if (track) {
        track.style.transition = 'transform 0.2s ease';
        track.style.transform = 'translateX(' + targetX + ')';
      }
      setTimeout(function() {
        _previewIdx = newIdx;
        var cnt = document.getElementById('preview-counter');
        if (cnt) cnt.textContent = (newIdx + 1) + ' / ' + _creations.length;
        resetTrack(newIdx);
      }, 200);
    }
  } else if (_touchDragging) {
    // Small drag — spring back to center
    if (track) {
      track.style.transition = 'transform 0.25s ease';
      track.style.transform = 'translateX(' + trackCenter() + ')';
    }
  }
  _touchDragging = false;
});

function toggleSidebar() {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('sidebar-overlay');
  if (!sb || !ov) return;
  sb.style.transform = 'translateX(0)';
  ov.style.display = 'block';
}
function closeSidebar() {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('sidebar-overlay');
  if (!sb) return;
  sb.style.transform = 'translateX(-100%)';
  if (ov) ov.style.display = 'none';
}

// Init
renderAuth();
loadGallery();
</script>
<script>document.addEventListener('DOMContentLoaded',function(){initUnifiedSidebar('my-creations');});</script>
